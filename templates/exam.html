{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="card shadow border-0 p-4 text-end">
        <div class="d-flex justify-content-between mb-4 border-bottom pb-2">
            <h3 class="fw-bold text-primary">اختبار تحديد المستوى 🧠</h3>
            <span class="badge bg-dark fs-5" id="timer">00:00</span>
        </div>

        <form id="examForm" action="/analyze_results" method="POST">
            {% for q in questions %}
            {% set q_loop_index = loop.index0 %}
            <div class="mb-4 bg-white p-4 rounded-3 border-end border-4 border-primary shadow-sm">
                <span class="badge bg-info text-dark mb-2">{{ q.subject }}</span>
                <h5 class="fw-bold mb-3">{{ loop.index }}. {{ q.q }}</h5>

                <div class="options-container">
                    {% for ans in q.a %}
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="q{{ q_loop_index }}" id="choice_{{ q_loop_index }}_{{ loop.index0 }}" value="{{ ans }}" required>
                        <label class="form-check-label w-100 p-2 border rounded shadow-sm hover-effect" for="choice_{{ q_loop_index }}_{{ loop.index0 }}">
                            {{ ans }}
                        </label>
                    </div>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}

            <button class="btn btn-primary w-100 rounded-pill py-3 fw-bold mt-4 shadow transform-hover">تسليم النتيجة وعرض الجدول 🚀</button>
        </form>
    </div>
</div>

<style>
    .hover-effect:hover { background-color: #f8f9fa; cursor: pointer; transition: 0.3s; }
    .form-check-input:checked + .form-check-label {
        background-color: #eef2ff;
        border-color: #4361ee !important;
        color: #4361ee;
        font-weight: bold;
    }
    .transform-hover:hover { transform: scale(1.02); transition: 0.3s; }
</style>

<script>
    let s=0; setInterval(()=>{s++; let m=Math.floor(s/60).toString().padStart(2,'0'), sec=(s%60).toString().padStart(2,'0'); document.getElementById('timer').innerText=`${m}:${sec}`;},1000);
</script>
{% endblock %}
