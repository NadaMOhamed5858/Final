{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow border-0 mb-4 animate__animated animate__fadeInRight">
                <div class="card-header bg-primary text-white fw-bold d-flex justify-content-between align-items-center py-3">
                    <span><i class="fas fa-calendar-day me-2"></i> جدولك الدراسي اليومي</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive" style="min-height: 400px;">
                        {{ plan | safe }}
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow border-0 sticky-top animate__animated animate__fadeInLeft" style="top:20px; height:85vh; display: flex; flex-direction: column;">
                <div class="card-header bg-dark text-white fw-bold d-flex justify-content-between align-items-center">
                    <span>🤖 مساعدك الذكي</span>
                    <i class="fas fa-robot"></i>
                </div>
               
                <div id="chat-box" class="card-body overflow-auto bg-light p-3" style="flex-grow: 1; white-space: pre-wrap; line-height: 1.6;">
                    <div class="msg-bot-style mb-3">
                        <span class="d-inline-block bg-white border p-3 rounded-3 shadow-sm text-dark">أهلاً بكِ يا هندسة! أنا جاهز لمساعدتك في أي سؤال دراسي الآن.</span>
                    </div>
                </div>

                <div class="p-3 border-top bg-white">
                    <div class="input-group">
                        <input id="msg" type="text" class="form-control shadow-none" placeholder="اكتب سؤالك هنا...">
                        <button onclick="send()" class="btn btn-primary px-3"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function send(){
        let input = document.getElementById('msg');
        let box = document.getElementById('chat-box');
        if(!input.value.trim()) return;
       
        let text = input.value;
        box.innerHTML += `<div class="text-start mb-3 animate__animated animate__fadeIn"><span class="d-inline-block bg-primary text-white p-2 px-3 rounded-pill shadow-sm">${text}</span></div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        try {
            let res = await fetch('/ask-bot',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({message:text})
            });
            let d = await res.json();
            box.innerHTML += `<div class="mb-3 animate__animated animate__fadeIn"><div class="bg-white border p-3 rounded-3 shadow-sm text-dark">${d.reply}</div></div>`;
            box.scrollTop = box.scrollHeight;
        } catch(e) {
            box.innerHTML += `<div class="text-danger small mt-2">عذراً، حدث خطأ في الاتصال.</div>`;
        }
    }
</script>
{% endblock %}
